<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photolog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="stage-body">
  <div class="stage">
    <img id="layer-a" class="photo-layer" alt="">
    <img id="layer-b" class="photo-layer" alt="">
  </div>

  <div id="empty-stage" class="empty-stage hidden">暂无照片</div>

  <div class="progress-line"></div>

  <footer id="meta-bar" class="meta-bar"></footer>

  <svg class="progress-ring" viewBox="0 0 32 32" aria-hidden="true">
    <circle cx="16" cy="16" r="14" class="ring-bg"></circle>
    <circle cx="16" cy="16" r="14" class="ring-fg" id="ring-fg"></circle>
  </svg>

  <script src="main.js"></script>
</body>
</html>
